<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linktree-Rocket JR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body class="relative min-h-screen min-w-screen bg-[#000000]
bg-gradient-to-r from-[#000000] to-[#343132] bg-cover bg-no-repeat bg-top">

    <div class="min-h-screen flex flex-col items-center justify-center gap-[1.25rem]">

        <header class="flex flex-col items-center justify-center gap-[0.6rem]">

            <img src="./assets/Rocket_Logo_Linktree.webp"
            class="max-w-[120px] rounded-[50%] md:max-w-[180px]
            lg:max-w-[180px]" alt="Foto de perfil">

            <h1 class="font-[Poppins] font-bold text-2xl md:text-4xl lg:text-3xl text-[#FFFFFF] text-center pt-3">Rocket JR</h1>

            <!--Texto Desktop-->
            <p class="font-[Poppins] font-semibold hidden md:block
            lg:text-2xl text-[#FFFFFF] text-center pb-5">Soluções inovadoras e tecnológicas</p>

            <!--Texto Mobile-->
            <p class="font-[Poppins] font-semibold text-lg block lg:hidden md:hidden text-[#FFFFFF] text-center pb-2">Soluções inovadoras<br>e tecnológicas</p>

        </header>


        <main class="grid grid-cols-1 grid-rows-1 gap-[1.25rem]">

            <!--LinkedIn-->
            <a href="https://www.linkedin.com/company/rocket-jr/posts/?feedView=all" target="_blank"
            class="link flex flex-row-reverse items-center justify-between
            font-[Poppins] font-normal text-base md:text-2xl lg:text-lg
            transition-colors duration-200
            bg-gradient-to-r from-[#f15b5b] via-[#dd2424] to-[#aa1b1b]
            hover:from-[#c44a4a] hover:via-[#b11e1e] hover:to-[#801515]
            hover:scale-[1.05] transition-transform duration-200
            text-[#FFFFFF] hover:text-[#CCCCCC]
            w-[15rem] h-[3rem] rounded-[1.8rem] px-[4rem]
            md:w-[22rem] md:h-[3.6rem] md:rounded-[1.9rem] md:px-[6rem]
            lg:w-[20rem] lg:h-[3.5rem] lg:rounded-[1.8rem] lg:px-[6rem]">
                LinkedIn
                <i class="bi bi-linkedin text-3xl md:text-[2.5rem] lg:text-4xl"></i>
            </a>

            <!--WhatsApp-->
            <a href="https://wa.me/5582996940657?text=Ol%C3%A1!%20Vim%20pelo%20Linktree%20da%20Rocket%20Jr.%20Gostaria%20de%20mais%20informações" target="_blank"
            class="link flex flex-row-reverse items-center justify-between
            font-[Poppins] font-normal text-base md:text-2xl lg:text-lg
            bg-gradient-to-r from-[#f15b5b] via-[#dd2424] to-[#aa1b1b]
            hover:from-[#c44a4a] hover:via-[#b11e1e] hover:to-[#801515]
            hover:scale-[1.05] transition-transform duration-200
            text-[#FFFFFF] hover:text-[#CCCCCC]
            w-[15rem] h-[3rem] rounded-[1.8rem] px-[3.5rem]
            md:w-[22rem] md:h-[3.6rem] md:rounded-[1.9rem] md:px-[5.5rem]
            lg:w-[20rem] lg:h-[3.5rem] lg:rounded-[1.8rem] lg:px-[5.5rem]">
                WhatsApp
                <i class="bi bi-whatsapp text-3xl md:text-[2.5rem] lg:text-4xl"></i>
            </a>

            <!--Instagram-->
            <a href="https://www.instagram.com/rocketjroficial/?next=%2F"
            target="_blank"
            class="link flex flex-row-reverse items-center justify-between
            font-[Poppins] font-normal text-base md:text-2xl lg:text-lg
            bg-gradient-to-r from-[#f15b5b] via-[#dd2424] to-[#aa1b1b]
            hover:from-[#c44a4a] hover:via-[#b11e1e] hover:to-[#801515]
            hover:scale-[1.05] transition-transform duration-200
            text-[#FFFFFF] hover:text-[#CCCCCC]
            w-[15rem] h-[3rem] rounded-[1.8rem] px-[3.5rem]
            md:w-[22rem] md:h-[3.6rem] md:rounded-[1.9rem] md:px-[5.5rem]
            lg:w-[20rem] lg:h-[3.5rem] lg:rounded-[1.8rem] lg:px-[5.5rem]">
                Instagram
                <i class="bi bi-instagram text-3xl md:text-[2.5rem] lg:text-4xl"></i>
            </a>

            <!--Nosso Site-->
            <a href="https://rocketjr.com.br/" target="_blank"
            class="link flex flex-row-reverse items-center justify-between
            font-[Poppins] font-normal text-base md:text-2xl lg:text-lg bg-gradient-to-r from-[#f15b5b] via-[#dd2424] to-[#aa1b1b]
            hover:from-[#c44a4a] hover:via-[#b11e1e] hover:to-[#801515]
            hover:scale-[1.05] transition-transform duration-200
            text-[#FFFFFF] hover:text-[#CCCCCC]
            w-[15rem] h-[3rem] rounded-[1.8rem] px-[3.5rem]
            md:w-[22rem] md:h-[3.6rem] md:rounded-[1.9rem] md:px-[5.5rem]
            lg:w-[20rem] lg:h-[3.5rem] lg:rounded-[1.8rem] lg:px-[5.5rem]">
                Nosso Site
                <i class="bi bi-globe2 text-3xl md:text-[2.5rem] lg:text-4xl"></i>
            </a>

        </main>

        <footer class="flex flex-inline items-center justify-center text-center m-[1rem] gap-[1.25rem]">

            <!--E-mail-->
            <a href="mailto:rocketjr.ej@gmail.com" target="_blank"
            class="link
            bg-gradient-to-r from-[#f15b5b] via-[#dd2424] to-[#aa1b1b]
            hover:from-[#c44a4a] hover:via-[#b11e1e] hover:to-[#801515]
            hover:scale-[1.05] transition-transform duration-200
            text-[#FFFFFF] hover:text-[#CCCCCC]
            w-[4rem] h-[4rem] rounded-[50%] m-[0 0.3rem] pt-3
            md:w-[4.8rem] md:h-[4.8rem] md:rounded-[50%]
            md:m-[0 0.6rem] md:pt-4
            lg:w-[4.3rem] lg:h-[4.3rem] lg:rounded-[50%] lg:m-[0 0.6rem] lg:pt-3">

                <i class="bi bi-envelope text-3xl md:text-[2.5rem] lg:text-4xl text-center"></i>
            </a>

            <button onclick="compartilhar()"
            class="bg-gradient-to-r from-[#f15b5b] via-[#dd2424] to-[#aa1b1b]
            hover:from-[#c44a4a] hover:via-[#b11e1e] hover:to-[#801515]
            hover:scale-[1.05] transition-transform duration-200
            text-[#FFFFFF] hover:text-[#CCCCCC]
            w-[4rem] h-[4rem] rounded-[50%] m-[0 0.3rem]
            md:w-[4.8rem] md:h-[4.8rem] md:rounded-[50%]
            md:m-[0 0.6rem]
            lg:w-[4.3rem] lg:h-[4.3rem] lg:rounded-[50%] lg:m-[0 0.6rem] ">

                <i class="bi bi-share-fill text-3xl md:text-[2.5rem] lg:text-4xl text-center"></i>
            </button>

        </footer>

        <script>
            function compartilhar() {
                if (navigator.share) {
                        navigator.share({
                        title: document.title,
                        text: 'Confira este link in bio!',
                        url: window.location.href,
                    })
                    .then(() => console.log('Compartilhado com sucesso!'))
                    .catch((error) => console.log('Erro ao compartilhar:', error));
                } else {
                    alert('Compartilhamento não suportado neste navegador.');
                }
            }
        </script>

    </div> <!--Fim do Container-->

</body>

</html>
